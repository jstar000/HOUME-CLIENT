name: Sync fork branches from upstream

on:
  schedule:
    # Periodic sync (adjust as needed to control Vercel deploy frequency)
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: true

jobs:
  sync:
    # Guard: only run in the personal fork (prevents accidental runs in upstream org repo)
    if: github.repository_owner == 'maehwasoo'
    runs-on: ubuntu-latest
    steps:
      - name: Sync main and develop from upstream
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          sync_branch() {
            local branch="$1"
            echo "==> Syncing branch: ${branch}"

            local http_code
            http_code="$(
              curl -sS -L -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPO}/merge-upstream" \
                -d "{\"branch\":\"${branch}\"}" \
                -o /tmp/merge-upstream.json \
                -w "%{http_code}"
            )"

            cat /tmp/merge-upstream.json

            # 200: success (fast-forwarded or already up to date)
            if [ "${http_code}" = "200" ]; then
              echo "Sync OK (HTTP 200)"
              return 0
            fi

            # 409: conflict (manual resolution required)
            if [ "${http_code}" = "409" ]; then
              echo "Sync conflict for ${branch} (HTTP 409). Manual resolution required." >&2
              return 1
            fi

            echo "Sync failed for ${branch} (HTTP ${http_code})" >&2
            return 1
          }

          sync_branch main
          sync_branch develop
